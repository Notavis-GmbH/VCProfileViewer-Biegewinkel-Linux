name: Build VC3DProfileViewer Biegewinkel (Linux ARM64 - Raspberry Pi 5)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-arm64:
    name: Build & Package (Linux ARM64 - Cross Compilation)
    runs-on: ubuntu-24.04

    env:
      KEYGEN_PRODUCT_TOKEN:        ${{ secrets.KEYGEN_PRODUCT_TOKEN }}
      KEYGEN_ACCOUNT_ID:           ${{ secrets.KEYGEN_ACCOUNT_ID }}
      KEYGEN_COMMERCIAL_POLICY_ID: ${{ secrets.KEYGEN_COMMERCIAL_POLICY_ID }}
      KEYGEN_TRIAL_POLICY_ID:      ${{ secrets.KEYGEN_TRIAL_POLICY_ID }}
      KEYGEN_PRODUCT_ID:           ${{ secrets.KEYGEN_PRODUCT_ID }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure apt for ARM64 cross-compilation
      run: |
        sudo dpkg --add-architecture arm64

        # Vorhandene .list Quellen auf amd64 einschraenken
        [ -f /etc/apt/sources.list ] && \
          sudo sed -i \
            -e 's|^deb \(https\?://\)|deb [arch=amd64] \1|' \
            -e 's|^deb \[arch=[^]]*\]|deb [arch=amd64]|' \
            /etc/apt/sources.list || true

        for f in /etc/apt/sources.list.d/*.list; do
          [ -f "$f" ] && sudo sed -i \
            -e 's|^deb \(https\?://\)|deb [arch=amd64] \1|' \
            -e 's|^deb \[arch=[^]]*\]|deb [arch=amd64]|' \
            "$f" || true
        done

        # DEB822-Format (.sources) ebenfalls einschraenken
        for f in /etc/apt/sources.list.d/*.sources; do
          [ -f "$f" ] && sudo sed -i \
            -e 's|^Architectures:.*|Architectures: amd64|' \
            "$f" || true
          # Falls kein Architectures-Feld: hinzufuegen
          [ -f "$f" ] && grep -q "^Architectures:" "$f" || \
            sudo sed -i '/^URIs:/i Architectures: amd64' "$f" 2>/dev/null || true
        done

        # ARM64 Paketquellen via ports.ubuntu.com hinzufuegen
        printf '%s\n%s\n%s\n' \
          'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse' \
          'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse' \
          'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse' \
          | sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null

        # Update - ignoriere Fehler bei nicht-existenten arm64 Indizes
        sudo apt-get update -qq 2>&1 | grep -v "^E: Failed to fetch" | grep -v "arm64.*404" || true
        # Zweiter Versuch mit Fehlertoleranz
        sudo apt-get update -q --ignore-missing 2>/dev/null || \
          sudo apt-get update -q -o APT::Get::List-Cleanup=0 || true

    - name: Install cross-compilation toolchain and ARM64 Qt6
      run: |
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build \
          gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          patchelf file

        sudo apt-get install -y --no-install-recommends \
          libqt6core6t64:arm64 \
          libqt6gui6t64:arm64 \
          libqt6widgets6t64:arm64 \
          libqt6charts6:arm64 \
          libqt6network6t64:arm64 \
          libqt6svg6:arm64 \
          libqt6opengl6t64:arm64 \
          qt6-base-dev:arm64 \
          qt6-charts-dev:arm64 \
          libqt6svg6-dev:arm64 \
          libgl-dev:arm64 \
          libgles-dev:arm64 \
          libglx-dev:arm64 \
          mesa-common-dev:arm64 \
          libfontconfig1-dev:arm64 \
          libfreetype6-dev:arm64 \
          libx11-dev:arm64 \
          libxext-dev:arm64 \
          libxrender-dev:arm64 \
          libxcb1-dev:arm64 \
          libxcb-render0-dev:arm64 \
          libxcb-shape0-dev:arm64 \
          libxcb-xfixes0-dev:arm64 \
          libxcb-util-dev:arm64 \
          libxkbcommon-dev:arm64 \
          libxkbcommon-x11-dev:arm64

        sudo apt-get install -y --no-install-recommends \
          qt6-base-dev \
          qt6-base-dev-tools

    - name: Create CMake toolchain file
      run: |
        cat > /tmp/aarch64-toolchain.cmake << 'EOF'
        set(CMAKE_SYSTEM_NAME Linux)
        set(CMAKE_SYSTEM_PROCESSOR aarch64)
        set(CMAKE_C_COMPILER   aarch64-linux-gnu-gcc)
        set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
        set(CMAKE_STRIP        aarch64-linux-gnu-strip)
        set(CMAKE_FIND_ROOT_PATH /usr/lib/aarch64-linux-gnu /usr/aarch64-linux-gnu /lib/aarch64-linux-gnu)
        set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
        set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
        set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
        set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE BOTH)
        set(Qt6_DIR /usr/lib/aarch64-linux-gnu/cmake/Qt6)
        set(QT_HOST_PATH /usr)
        set(QT_HOST_PATH_CMAKE_DIR /usr/lib/x86_64-linux-gnu/cmake)
        EOF
        sed -i 's/^        //' /tmp/aarch64-toolchain.cmake
        echo "Toolchain created"

    - name: Debug Qt6 installation
      run: |
        echo "=== Qt6 cmake dirs ==="
        find /usr -name "Qt6Config.cmake" 2>/dev/null || echo "Qt6Config.cmake not found"
        echo "=== OpenGL headers ==="
        find /usr -name "gl.h" -path "*/aarch64*" 2>/dev/null | head -5 || echo "No OpenGL headers for arm64"
        ls /usr/include/aarch64-linux-gnu/GL/ 2>/dev/null || echo "No GL include dir"
        echo "=== dpkg OpenGL arm64 ==="
        dpkg -l | grep -i "libgl.*arm64\|gl-dev.*arm64\|mesa.*arm64" | awk '{print $2, $3}' | head -10

    - name: Configure CMake
      run: |
        TS=$(date -u +"%Y-%m-%d-%H%M")
        echo "BUILD_TS=$TS" >> $GITHUB_ENV
        cmake -B build -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=/tmp/aarch64-toolchain.cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH=/usr/lib/aarch64-linux-gnu/cmake \
          -DQt6_DIR=/usr/lib/aarch64-linux-gnu/cmake/Qt6 \
          -DOPENGL_INCLUDE_DIR=/usr/include \
          -DOPENGL_opengl_LIBRARY=/usr/lib/aarch64-linux-gnu/libGL.so \
          -DOPENGL_gl_LIBRARY=/usr/lib/aarch64-linux-gnu/libGL.so \
          -DOPENGL_glx_LIBRARY=/usr/lib/aarch64-linux-gnu/libGL.so \
          -DOPENGL_GL_PREFERENCE=LEGACY \
          -DBUILD_TIMESTAMP="$TS" \
          -DKEYGEN_PRODUCT_TOKEN="${KEYGEN_PRODUCT_TOKEN}" \
          -DKEYGEN_ACCOUNT_ID="${KEYGEN_ACCOUNT_ID}" \
          -DKEYGEN_COMMERCIAL_POLICY_ID="${KEYGEN_COMMERCIAL_POLICY_ID}" \
          -DKEYGEN_TRIAL_POLICY_ID="${KEYGEN_TRIAL_POLICY_ID}" \
          -DKEYGEN_PRODUCT_ID="${KEYGEN_PRODUCT_ID}"

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Verify ARM64 binary
      run: |
        EXE=$(find build -name "VC3DProfileViewer" -type f | head -1)
        file "$EXE"
        file "$EXE" | grep -q "aarch64" \
          && echo "aarch64 binary confirmed" \
          || (echo "not aarch64" && exit 1)

    - name: Assemble portable package
      run: |
        PKG="VC3DProfileViewer_linux_arm64"
        mkdir -p "$PKG"/{Data,Devices,TestData,resources,lib,docs}

        EXE=$(find build -name "VC3DProfileViewer" -type f | head -1)
        aarch64-linux-gnu-strip "$EXE"
        cp "$EXE" "$PKG/"

        QT_LIB="/usr/lib/aarch64-linux-gnu"
        for lib in \
          libQt6Core libQt6Gui libQt6Widgets libQt6Charts \
          libQt6Network libQt6Svg libQt6OpenGL \
          libicui18n libicuuc libicudata \
          libdouble-conversion libmd4c libpcre2-16 libzstd libz; do
          find "$QT_LIB" /lib/aarch64-linux-gnu -maxdepth 1 \
            -name "${lib}.so*" ! -type l 2>/dev/null \
            | head -1 | xargs -I{} cp {} "$PKG/lib/" 2>/dev/null || true
        done

        cp -r tests/data/* "$PKG/TestData/" 2>/dev/null || true
        cp resources/logo_notavis.svg "$PKG/resources/" 2>/dev/null || true
        [ -f README.md ]     && cp README.md     "$PKG/"       || true
        [ -f docs/EULA.pdf ] && cp docs/EULA.pdf "$PKG/docs/"  || true
        [ -f LICENSE.txt ]   && cp LICENSE.txt   "$PKG/docs/"  || true

        SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        TS="${{ env.BUILD_TS }}"
        printf "VC3DProfileViewer Biegewinkel Linux ARM64\nBranch: ${{ github.ref_name }}\nCommit: %s\nBuilt : %s UTC\nMethod: Cross-compiled (ubuntu-24.04 -> aarch64-linux-gnu)\n" \
          "$SHA" "$TS" > "$PKG/VERSION.txt"

    - name: Create launcher script
      run: |
        PKG="VC3DProfileViewer_linux_arm64"
        printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\nexport LD_LIBRARY_PATH="$DIR/lib:$LD_LIBRARY_PATH"\nexec "$DIR/VC3DProfileViewer" "$@"\n' \
          > "$PKG/start.sh"
        chmod +x "$PKG/start.sh"

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: VC3DProfileViewer_Biegewinkel_linux_arm64_${{ github.sha }}
        path: VC3DProfileViewer_linux_arm64/
        retention-days: 30

    - name: Create release TAR
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        TS="${{ env.BUILD_TS }}"
        SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        tar -czf "VCProfileViewer_Biegewinkel_linux_arm64_v1.0-${TS}-${SHA}.tar.gz" \
          -C VC3DProfileViewer_linux_arm64 .

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name:    build-linux-${{ github.run_number }}
        name:        "VCProfileViewer Biegewinkel Linux ARM64 - Build #${{ github.run_number }}"
        body: |
          ## Automatischer Build von `main` - Linux ARM64 (Raspberry Pi 5)

          **Commit:** `${{ github.sha }}`
          **Build:** #${{ github.run_number }}
          **Methode:** Cross-Compilation (ubuntu-24.04 -> aarch64-linux-gnu)

          ### Installation auf Raspberry Pi 5
          ```bash
          tar -xzf VCProfileViewer_Biegewinkel_linux_arm64_v1.0-*.tar.gz
          ./start.sh
          ```

          ### Inhalt
          - `VC3DProfileViewer` - ausfuehrbare Datei (ARM64)
          - `start.sh` - Starter-Skript mit Bibliothekspfad
          - `lib/` - Qt6-Bibliotheken
          - `Data/` - JSON-Aufzeichnungen hier ablegen
          - `docs/EULA.pdf` - Endnutzer-Lizenzvertrag
        files: VCProfileViewer_Biegewinkel_linux_arm64_v1.0-*.tar.gz
        draft:       false
        prerelease:  false
        make_latest: true
        overwrite_files: true
